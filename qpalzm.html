<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Loading...</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #0a0a0a;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        /* Efek bintang berkilau di latar belakang */
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            background: radial-gradient(2px 2px at 20px 30px, #eee, transparent),
                        radial-gradient(2px 2px at 40px 70px, rgba(255,255,255,0.8), transparent),
                        radial-gradient(2px 2px at 50px 160px, #ddd, transparent),
                        radial-gradient(2px 2px at 90px 40px, rgba(255,255,255,0.6), transparent),
                        radial-gradient(2px 2px at 130px 80px, #fff, transparent),
                        radial-gradient(2px 2px at 160px 30px, rgba(255,255,255,0.7), transparent);
            background-size: 200px 200px;
            animation: twinkle 3s ease-in-out infinite alternate;
        }

        @keyframes twinkle {
            0% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        /* Container utama */
        .container {
            text-align: center;
            z-index: 1;
            position: relative;
        }

        /* Lingkaran loading berputar dengan gradien */
        .loader {
            width: 80px;
            height: 80px;
            margin: 0 auto 30px auto;
            border: 4px solid rgba(255, 255, 255, 0.05);
            border-top: 4px solid transparent;
            border-radius: 50%;
            position: relative;
            animation: spin 1.2s cubic-bezier(0.6, 0, 0.4, 1) infinite;
        }

        .loader::before {
            content: '';
            position: absolute;
            top: -4px;
            left: -4px;
            right: -4px;
            bottom: -4px;
            border-radius: 50%;
            border: 4px solid transparent;
            border-top: 4px solid #8a2be2;
            border-right: 4px solid #00bfff;
            animation: spin 2s linear infinite;
        }

        .loader::after {
            content: '';
            position: absolute;
            top: -8px;
            left: -8px;
            right: -8px;
            bottom: -8px;
            border-radius: 50%;
            border: 4px solid transparent;
            border-bottom: 4px solid #ff6b6b;
            border-left: 4px solid #ffd93d;
            animation: spin 1.5s linear infinite reverse;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Teks dengan efek glow */
        .text {
            color: #ffffff;
            font-size: 1.1rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            opacity: 0.7;
            animation: pulse 2s ease-in-out infinite;
            font-weight: 300;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.4; transform: scale(1); }
            50% { opacity: 0.9; transform: scale(1.02); }
        }

        /* Efek partikel kecil di sekitar */
        .particle {
            position: fixed;
            width: 3px;
            height: 3px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            pointer-events: none;
            animation: float linear infinite;
        }

        @keyframes float {
            0% {
                transform: translateY(100vh) scale(0);
                opacity: 0;
            }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% {
                transform: translateY(-10vh) scale(1);
                opacity: 0;
            }
        }

        /* Progress bar halus di bawah */
        .progress-bar {
            width: 200px;
            height: 2px;
            background: rgba(255, 255, 255, 0.05);
            margin: 30px auto 0 auto;
            border-radius: 2px;
            overflow: hidden;
            position: relative;
        }

        .progress-bar::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, #8a2be2, #00bfff, #ff6b6b, #ffd93d);
            animation: progress 5s ease-in-out forwards;
            border-radius: 2px;
        }

        @keyframes progress {
            0% { left: -100%; width: 30%; }
            50% { left: 20%; width: 50%; }
            100% { left: 100%; width: 70%; }
        }
    </style>
</head>
<body>

    <!-- Bintang latar -->
    <div class="stars"></div>

    <!-- Partikel acak -->
    <div id="particles"></div>

    <!-- Konten utama -->
    <div class="container">
        <div class="loader"></div>
        <div class="text">Loading...</div>
        <div class="progress-bar"></div>
    </div>

    <script>
        // Buat partikel acak
        function createParticles() {
            const container = document.getElementById('particles');
            for (let i = 0; i < 30; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.width = (Math.random() * 4 + 1) + 'px';
                particle.style.height = particle.style.width;
                particle.style.animationDuration = (Math.random() * 15 + 10) + 's';
                particle.style.animationDelay = (Math.random() * 10) + 's';
                particle.style.opacity = Math.random() * 0.5 + 0.1;
                container.appendChild(particle);
            }
        }
        createParticles();

        // Redirect setelah 5 detik
        setTimeout(function() {
            window.location.href = "http://private.lynzzofficial.com:2290";
        }, 5000);
    </script>

</body>
</html>
